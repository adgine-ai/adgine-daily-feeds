<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --text: #16202a;
      --muted: #5d6b7a;
      --subtle: #8492a3;
      --line: #dce3ea;
      --brand: #0b7bd3;
      --soft: #f1f4f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }
    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
    }
    .brand {
      margin: 0 0 10px;
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px;
    }
    .stat strong {
      display: block;
      font-size: 22px;
    }
    .stat span {
      display: block;
      margin-top: 2px;
      color: var(--subtle);
      font-size: 12px;
    }
    section {
      border-bottom: 1px solid var(--line);
      padding: 28px 0;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.3;
    }
    .lead {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.75;
      font-weight: 650;
    }
    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.72;
    }
    .items {
      display: grid;
      gap: 12px;
    }
    article {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 16px;
    }
    .index {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-weight: 700;
    }
    a.title {
      color: var(--brand);
      font-size: 18px;
      line-height: 1.48;
      font-weight: 720;
      text-decoration: none;
    }
    a.title:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .chip {
      border-radius: 999px;
      background: var(--soft);
      padding: 5px 9px;
    }
    .recommendation {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.68;
    }
    footer {
      padding-top: 24px;
      color: var(--subtle);
      font-size: 13px;
    }
    @media (max-width: 680px) {
      .page { width: min(100% - 24px, 960px); }
      h1 { font-size: 30px; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      article { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <p class="brand">{{displayScope}}</p>
      <h1>{{title}}</h1>
      <div class="meta">{{capturedAt}}{{windowLabel}}</div>
      <div class="stats">
        <div class="stat"><strong>{{sampledCount}}</strong><span>采集样本</span></div>
        <div class="stat"><strong>{{windowCount}}</strong><span>窗口条目</span></div>
        <div class="stat"><strong>{{selectedCount}}</strong><span>入选日报</span></div>
      </div>
    </header>
    {{content}}
    <footer>{{footer}}</footer>
  </main>
</body>
</html>
