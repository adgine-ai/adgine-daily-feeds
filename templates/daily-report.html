<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --text-soft: #334155;
      --muted: #64748b;
      --subtle: #94a3b8;
      --line: #e2e8f0;
      --line-soft: #edf2f7;
      --brand: #2563eb;
      --brand-ink: #1d4ed8;
      --brand-soft: #eff6ff;
      --good: #16a34a;
      --warning: #ca8a04;
      --card-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1e293b;
      --text: #f8fafc;
      --text-soft: #dbeafe;
      --muted: #cbd5e1;
      --subtle: #94a3b8;
      --line: #243044;
      --line-soft: #1f2937;
      --brand: #60a5fa;
      --brand-ink: #93c5fd;
      --brand-soft: rgba(37, 99, 235, 0.16);
      --good: #4ade80;
      --warning: #fbbf24;
      --card-shadow: none;
      --shadow: none;
    }
    body {
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(0deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px) 0 0 / 34px 34px,
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklab, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }
    .topbar-inner {
      display: grid;
      width: min(1200px, calc(100% - 48px));
      min-height: 68px;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      margin: 0 auto;
    }
    .brand {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 14px;
      color: var(--text);
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .brand-mark {
      color: var(--text);
      font-size: 20px;
      font-weight: 820;
      line-height: 1;
      letter-spacing: 0;
    }
    .brand-divider {
      width: 1px;
      height: 22px;
      background: var(--line);
    }
    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }
    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }
    .container {
      width: min(1100px, calc(100% - 48px));
      margin: 0 auto;
      padding: 54px 0 72px;
    }
    .toolbar {
      display: flex;
      justify-content: flex-end;
    }
    .theme-toggle {
      display: inline-grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      box-shadow: var(--card-shadow);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 16px;
      font-weight: 780;
      line-height: 1;
      transition: border-color 0.16s, background 0.16s, color 0.16s;
    }
    .theme-toggle:hover {
      border-color: #bfdbfe;
      background: var(--brand-soft);
      color: var(--brand-ink);
    }
    .header {
      margin: 0 auto 36px;
      text-align: center;
    }
    h1 {
      max-width: 980px;
      margin: 20px auto 0;
      color: var(--text);
      font-size: clamp(42px, 7vw, 66px);
      font-weight: 820;
      line-height: 1.04;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 18px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 520;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 0;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-ink);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0;
    }
    .badge::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
      content: "";
    }
    .conclusion {
      margin: 8px 0 40px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--card-shadow);
      padding: 25px 25px 22px;
    }
    .conclusion .tag {
      display: inline-flex;
      align-items: center;
      margin-bottom: 18px;
      border-radius: 7px;
      background: var(--brand-soft);
      color: var(--brand-ink);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
    }
    .conclusion .summary {
      margin-bottom: 16px;
      color: var(--text);
      font-size: 22px;
      font-weight: 760;
      line-height: 1.5;
    }
    .conclusion ul { list-style: none; }
    .conclusion li {
      position: relative;
      padding: 6px 0 6px 18px;
      color: var(--text-soft);
      font-size: 14px;
    }
    .conclusion li::before {
      position: absolute;
      left: 0;
      color: var(--brand);
      content: "•";
    }
    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 40px 0 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }
    .section-title {
      color: var(--text);
      font-size: 24px;
      font-weight: 820;
      letter-spacing: -0.01em;
    }
    .section-count {
      flex-shrink: 0;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--subtle);
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 760;
    }
    .card {
      position: relative;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--card-shadow);
      padding: 20px 22px 18px;
      transition: border-color 0.16s, box-shadow 0.16s, background 0.16s;
    }
    .card:hover {
      border-color: #93c5fd;
      box-shadow: var(--shadow);
    }
    .card.source-x {
      border-left: 4px solid var(--text);
    }
    body[data-theme="dark"] .card.source-x {
      border-left-color: #f8fafc;
    }
    .card.source-medium {
      border-left: 4px solid #2b5d90;
    }
    .card.source-weixin {
      border-left: 4px solid var(--good);
    }
    .title-row {
      display: block;
    }
    .index {
      display: inline-flex;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand-ink);
      font-size: 13px;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }
    .title-block {
      min-width: 0;
      flex: 1;
      padding-right: 116px;
    }
    .source-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.5;
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid #bfdbfe;
      border-radius: 7px;
      background: var(--brand-soft);
      color: var(--brand-ink);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.5;
      white-space: nowrap;
    }
    .platform-x {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }
    body[data-theme="dark"] .platform-x {
      background: #f8fafc;
      color: #0f172a;
    }
    .platform-medium {
      border-color: #00ab6c;
      background: #00ab6c;
      color: #fff;
    }
    .platform-weixin {
      border-color: #17b26a;
      background: #17b26a;
      color: #fff;
    }
    .meta-sep {
      color: var(--line);
    }
    .source-time {
      color: var(--muted);
      font-weight: 640;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .source-label {
      max-width: 280px;
      overflow: hidden;
      color: var(--subtle);
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .title {
      min-width: 0;
      color: var(--text);
      font-size: 21px;
      font-weight: 780;
      line-height: 1.38;
      text-decoration: none;
    }
    .title:hover {
      color: var(--brand-ink);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .quality {
      position: absolute;
      top: 18px;
      right: 22px;
      border-radius: 6px;
      background: #fff1ed;
      color: #c2410c;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 780;
      line-height: 1.5;
      white-space: nowrap;
    }
    .summary-text {
      max-width: 980px;
      margin-top: 12px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.68;
    }
    .tags,
    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .tags span,
    .metrics span {
      border: 1px solid #bfdbfe;
      border-radius: 7px;
      background: var(--brand-soft);
      color: var(--brand-ink);
      font-size: 11px;
      font-weight: 740;
      line-height: 1.4;
      padding: 3px 8px;
    }
    .metrics span {
      border-color: var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 640;
    }
    .recommend {
      margin-top: 14px;
      border-left: 2px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.62;
      padding-left: 12px;
    }
    .footer {
      margin-top: 34px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      color: var(--subtle);
      text-align: center;
      font-size: 12px;
    }
      @media (max-width: 640px) {
      .topbar-inner {
        width: min(100% - 28px, 1200px);
        grid-template-columns: 1fr auto;
      }
      .brand-sub,
      .brand-divider { display: none; }
      .container {
        width: min(100% - 28px, 1100px);
        padding-top: 36px;
      }
      h1 { font-size: 38px; }
      .meta { font-size: 13px; }
      .conclusion { padding: 20px 18px; }
      .conclusion .summary { font-size: 19px; }
      .title { font-size: 18px; }
      .card { padding: 20px 18px; }
      .title-block { padding-right: 0; }
      .quality {
        position: static;
        margin-left: auto;
      }
      .source-label { max-width: 170px; }
      .section-heading {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body data-theme="{{theme}}">
  <nav class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">⌃</span>
        <span>ADGINE</span>
        <span class="brand-divider"></span>
        <span class="brand-sub">Daily Brief</span>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">&#9680;</button>
      </div>
    </div>
  </nav>
  <main class="container">
    <header class="header">
      <div class="badge">{{badge}}</div>
      <h1>{{title}}</h1>
      <div class="meta">
        <span>{{date}}</span>
        <span>{{displayScope}}</span>
        <span>{{windowText}}</span>
      </div>
    </header>
    {{content}}
    <footer class="footer">{{footer}}</footer>
  </main>
  <script>
    (function () {
      var button = document.querySelector("[data-theme-toggle]");
      function syncIcon() {
        var theme = document.body.getAttribute("data-theme") || "light";
        if (button) button.innerHTML = theme === "dark" ? "&#9728;" : "&#9680;";
      }
      if (button) {
        syncIcon();
        button.addEventListener("click", function () {
          var current = document.body.getAttribute("data-theme") || "light";
          document.body.setAttribute("data-theme", current === "dark" ? "light" : "dark");
          syncIcon();
        });
      }
    })();
  </script>
</body>
</html>
