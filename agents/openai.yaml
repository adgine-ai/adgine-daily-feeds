interface:
  display_name: "Adgine Daily Feeds"
  short_description: "Fetch, render, and analyze Chinese GEO/AEO feed, daily, and weekly reports"
  default_prompt: "Use $adgine-daily-feeds as the Agent entrypoint for hosted GEO/AEO intelligence. Default broad/latest requests to the hosted feed. Use daily endpoints only when the user explicitly asks for 日报, weekly endpoints when they ask for 周报, source filters for 公众号/X/Twitter/Medium when supported, time-window feed parameters for 最近 N 天 or A 到 B, and the HTML renderer for 预览/生成页面. If the user asks what the skill can do or gives no narrow task, list the default capabilities first: 最新信息流, 日报解读, 媒体日报分析, Feed 深度分析, 周报回顾, 来源/账号分析, HTML/Telegram 输出. For media daily-report analysis, explain conclusion quality, theme clusters, source structure, priority reads, weak signals, actions, and next tracking points. For feed analysis, explain emerging signals, repeated themes, source distribution, immediate reads, Wiki candidates, and accounts/keywords to track. Preserve API-provided WeChat, X, and Medium sections. Do not promise RSS, OpenAPI, public installer, or keyword search until those product surfaces exist. State the actual report date and slot/window, include saved JSON/HTML paths when artifacts are generated, and handle empty or failed API states with 数据状态、可能原因、下一步建议. After answering, append concise Chinese shortcut prompts such as 查看今日 GEO 日报, 查看最新 GEO 信息流, 分析今日媒体日报, 深度分析最新 Feeds, 查看往常日报, 生成 HTML 预览, or 生成本周 GEO 周报 when relevant."
policy:
  allow_implicit_invocation: true
